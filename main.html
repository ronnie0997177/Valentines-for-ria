<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be My Valentine 💖</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        text-align: center;
        color: white;
    }

    h1 {
        font-size: 3em;
        text-shadow: 2px 2px 15px rgba(0,0,0,0.3);
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.08); }
        100% { transform: scale(1); }
    }

    .buttons {
        margin-top: 40px;
        position: relative;
    }

    button {
        padding: 15px 40px;
        font-size: 1.2em;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.2s;
    }

    #yesBtn {
        background-color: #ff2e63;
        color: white;
        margin-right: 20px;
    }

    #noBtn {
        background-color: #333;
        color: white;
        position: fixed;
    }

    button:hover {
        transform: scale(1.1);
    }

    /* Popup */
    .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        visibility: hidden;
        opacity: 0;
        transition: 0.4s ease;
    }

    .popup-content {
        background: white;
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        animation: pop 0.5s ease;
    }

    .popup-content h2 {
        color: #ff2e63;
        font-size: 2em;
    }

    @keyframes pop {
        0% { transform: scale(0); }
        100% { transform: scale(1); }
    }

    .show {
        visibility: visible;
        opacity: 1;
    }

    /* Floating hearts */
    .heart {
        position: fixed;
        font-size: 20px;
        animation: floatUp linear forwards;
        color: red;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        100% {
            transform: translateY(-100vh) scale(1.5);
            opacity: 0;
        }
    }

    /* Heart-shaped image inside popup */
    .img-heart {
        width: 320px;
        height: 320px;
        max-width: 90vw;
        max-height: 70vh;
        display: block;
        margin: 0 auto 18px;
        transition: transform 220ms ease, opacity 220ms ease;
    }

</style>
</head>
<body>

<div class="container">
    <h1>Will You Be My Valentine? 💖</h1>
    <div class="buttons">
        <button id="yesBtn">Yes 💘</button>
        <button id="noBtn">No 😢</button>
    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <!-- Heart-shaped image filled with user's photo -->
        <svg class="img-heart" viewBox="0 0 32 29.6" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <defs>
                <clipPath id="heartClip">
                    <path d="M23.6,0c-2.9,0-5.1,1.8-6.6,3.6C15.5,1.8,13.3,0,10.4,0C4.7,0,0,4.7,0,10.4c0,7.5,10.7,13.5,16,19.2c5.3-5.7,16-11.7,16-19.2C32,4.7,27.3,0,23.6,0z"/>
                </clipPath>
            </defs>
            <image clip-path="url(#heartClip)" href="image/1770793592923.jpg" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" />
        </svg>
        <h2>YAYYYYY!!! 💕</h2>
        <p>I knew it! You actually like me — you're just playing hard to get! 💕😏</p>
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const popup = document.getElementById("popup");

    // Place No button initially somewhere random
    function moveNoButton() {
        const buttonWidth = noBtn.offsetWidth;
        const buttonHeight = noBtn.offsetHeight;

        const maxX = window.innerWidth - buttonWidth;
        const maxY = window.innerHeight - buttonHeight;

        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }

    // Dodge when mouse gets near
    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("mousemove", moveNoButton);

    // Yes button click
    yesBtn.addEventListener("click", function() {
        popup.classList.add("show");
        createHearts();
    });

    // Create floating hearts
    function createHearts() {
        for (let i = 0; i < 50; i++) {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💖";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.bottom = "0px";
            heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    }

    // Initial random position
    moveNoButton();
</script>

</body>
</html>
